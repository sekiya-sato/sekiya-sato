name: Change README image by weekday

on:
  schedule:
    # 月〜金の 00:00 JST に実行（sat/sun は同じ画像なのでスケジュール不要）。
    # JST 00:00 = UTC 15:00 previous day. Runs Mon-Fri at JST midnight.
    - cron: "0 15 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  change-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README image block
        run: |
          python <<'PY'
          import re
          from datetime import datetime
          from zoneinfo import ZoneInfo

          readme_path = "README.md"
          weekday = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%a").lower()

          image_map = {
              "mon": "./images/github-logo-gemini-happy.jpg",
              "tue": "./images/github-logo-gemini-hightention.jpg",
              "wed": "./images/github-logo-gemini-normal.jpg",
              "thu": "./images/github-logo-gemini-stressful.jpg",
              "fri": "./images/github-logo-gemini-hightention.jpg",
              "sat": "./images/github-logo-000-origin.jpg",
              "sun": "./images/github-logo-000-origin.jpg",
          }

          image_path = image_map[weekday]
          replacement = (
              "<!-- PROFILE_IMAGE_START -->\n"
              "<p align=\"center\">\n"
              f"<img src=\"{image_path}\" alt=\"プロフィール表示用画像 ({weekday})\" width=\"220\" />\n"
              "</p>\n"
              "<!-- PROFILE_IMAGE_END -->"
          )

          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- PROFILE_IMAGE_START -->.*?<!-- PROFILE_IMAGE_END -->",
              replacement,
              content,
              flags=re.DOTALL,
          )

          if updated == content:
              raise SystemExit("PROFILE_IMAGE block not found in README.md")

          with open(readme_path, "w", encoding="utf-8", newline="\n") as f:
              f.write(updated)
          PY

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README image for weekday"

      - name: Push changes
        if: steps.diff.outputs.changed == 'true'
        run: git push
